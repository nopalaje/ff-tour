<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Tournament Live - Nopal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: white; padding: 20px; text-align: center; }
        .card { background: #161625; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d2d3f; }
        input[type="number"] { background: #252545; color: #ff6b00; border: 1px solid #444; padding: 8px; border-radius: 6px; width: 65px; text-align: center; font-weight: bold; font-size: 16px; }
        .btn { background: #ff6b00; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3); }
        .btn:active { transform: scale(0.98); }
        .status { font-size: 12px; color: #00e676; margin-bottom: 15px; opacity: 0.8; }
        h2 { margin-bottom: 5px; color: #ff6b00; }
    </style>
</head>
<body>

    <h2>🏆 FF LEADERBOARD</h2>
    <div id="status" class="status">Menghubungkan ke GitHub...</div>

    <div id="leaderboard">
        <!-- Data tim akan muncul di sini -->
        <p>Memuat data tim...</p>
    </div>

    <button class="btn" onclick="updateSkor()">🚀 UPDATE SKOR LIVE</button>

<script>
    // --- KONFIGURASI OTOMATIS ---
    const OWNER = "nopal"; 
    const REPO = "ff-tour"; // GANTI ini jika nama repositori Anda bukan 'ff-tour'
    const TOKEN = "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";
    const PATH = "data.json";

    let daftarTim = [];
    let currentSha = "";

    // 1. Fungsi Ambil Data Terbaru
    async function loadData() {
        try {
            const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}?t=${Date.now()}`);
            const data = await response.json();
            
            if (data.content) {
                currentSha = data.sha;
                daftarTim = JSON.parse(atob(data.content));
                render();
                document.getElementById('status').innerText = "● LIVE: Terakhir diperbarui " + new Date().toLocaleTimeString();
            }
        } catch (e) {
            document.getElementById('status').innerText = "● Gagal sinkronisasi data.";
            console.error(e);
        }
    }

    // 2. Fungsi Kirim Update ke GitHub
    async function updateSkor() {
        // Update data dari input ke variabel
        daftarTim.forEach((t, i) => {
            const inputVal = document.getElementById(`inp-${i}`).value;
            t.skor = parseInt(inputVal) || 0;
        });

        document.getElementById('status').innerText = "Sedang mengirim ke cloud...";

        const contentBase64 = btoa(JSON.stringify(daftarTim, null, 2));
        
        try {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
                method: "PUT",
                headers: { 
                    "Authorization": `token ${TOKEN}`,
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    message: "Update skor otomatis",
                    content: contentBase64,
                    sha: currentSha
                })
            });

            if(res.ok) {
                alert("✅ Skor berhasil diupdate untuk semua HP!");
                loadData();
            } else {
                const err = await res.json();
                alert("❌ Gagal: " + err.message);
            }
        } catch (e) {
            alert("❌ Terjadi kesalahan koneksi.");
        }
    }

    // 3. Tampilkan ke Layar
    function render() {
        const container = document.getElementById('leaderboard');
        // Sortir berdasarkan skor tertinggi untuk tampilan (Visual saja)
        const displayData = [...daftarTim].sort((a,b) => b.skor - a.skor);
        
        container.innerHTML = daftarTim.map((t, i) => `
            <div class="card">
                <span><b>${t.nama}</b></span>
                <input type="number" id="inp-${i}" value="${t.skor}">
            </div>
        `).join('');
    }

    // Jalankan otomatis
    loadData();
    // Cek update tiap 30 detik agar HP tim lain ikut berubah
    setInterval(loadData, 30000);
</script>
</body>
</html>
