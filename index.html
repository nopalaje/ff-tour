<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FF Tournament</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#12121a; --surface:#1a1a26; --card:#242435;
            --orange:#ff6b00; --text:#f0f0f0; --muted:rgba(240,240,240,0.4);
            --border:rgba(255,255,255,0.08); --green:#00e676; --red:#ff4444;
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}

        #login-screen{position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
        .login-box{width:100%;max-width:320px;background:var(--surface);padding:25px;border-radius:15px;border:1px solid var(--border);}

        header{padding:15px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
        .logo-text{font-family:'Rajdhani';font-weight:700;font-size:20px;color:var(--orange);}

        .tabs-main{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:55px;z-index:100;}
        .tab-m{flex:1;padding:15px;text-align:center;font-family:'Rajdhani';font-weight:700;cursor:pointer;color:var(--muted);font-size:14px;border:none;background:none;}
        .tab-m.active{color:var(--orange);border-bottom:2px solid var(--orange);}

        .pot-selector{display:flex;overflow-x:auto;background:var(--bg);padding:10px;gap:8px;border-bottom:1px solid var(--border);position:sticky;top:105px;z-index:99;scrollbar-width:none;}
        .pot-selector::-webkit-scrollbar{display:none;}
        .btn-pot-tab{padding:8px 16px;background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:6px;white-space:nowrap;font-family:'Rajdhani';font-weight:700;font-size:12px;cursor:pointer;}
        .btn-pot-tab.active{background:var(--orange);color:white;border-color:var(--orange);}

        .scroll-area{padding:15px;padding-bottom:80px;}

        .team-item{background:var(--card);border-radius:10px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden;}
        .team-trigger{padding:15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
        .panel-content{padding:15px;border-top:1px solid var(--border);background:rgba(0,0,0,0.15);}

        .sect-label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;font-family:'Rajdhani';font-weight:700;}

        .grid-place{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:15px;}
        .btn-place{padding:12px 0;background:var(--surface);border:1px solid var(--border);color:white;border-radius:6px;font-family:'Rajdhani';font-weight:600;font-size:13px;cursor:pointer;text-align:center;width:100%;}
        .btn-place.sel{background:var(--orange);border-color:var(--orange);}
        .btn-place.used{opacity:0.2;pointer-events:none;}

        .kill-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:15px;}
        .btn-kadd{padding:12px 0;background:rgba(255,107,0,0.12);border:1px solid var(--orange);color:var(--orange);border-radius:6px;font-family:'Rajdhani';font-weight:700;font-size:13px;cursor:pointer;text-align:center;width:100%;}
        .btn-kreset{padding:12px 0;background:rgba(255,68,68,0.12);border:1px solid var(--red);color:var(--red);border-radius:6px;font-family:'Rajdhani';font-weight:700;font-size:11px;cursor:pointer;text-align:center;width:100%;}

        .kill-ctrl{display:flex;align-items:center;gap:10px;margin-bottom:15px;background:var(--bg);padding:10px;border-radius:8px;border:1px solid var(--border);}
        .btn-km{flex:1;padding:14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:white;font-size:22px;font-weight:700;cursor:pointer;text-align:center;}
        .btn-kp{flex:1;padding:14px;border-radius:8px;border:1px solid var(--orange);background:var(--surface);color:var(--orange);font-size:22px;font-weight:700;cursor:pointer;text-align:center;}
        .kill-num{flex:2;text-align:center;font-weight:700;font-size:20px;color:var(--orange);font-family:'Rajdhani';}

        .btn-save{width:100%;background:var(--orange);color:white;border:none;padding:14px;border-radius:8px;font-weight:700;font-size:15px;font-family:'Rajdhani';cursor:pointer;margin-top:5px;}
        .btn-del{width:100%;background:none;color:var(--red);border:1px solid rgba(255,68,68,0.35);padding:12px;border-radius:8px;font-size:12px;font-weight:700;margin-top:10px;font-family:'Rajdhani';cursor:pointer;}

        .input-dark{width:100%;background:var(--bg);border:1px solid var(--border);color:white;padding:12px;border-radius:8px;margin-bottom:10px;outline:none;font-size:16px;font-family:'Barlow';}

        .board-item{background:var(--card);padding:15px;border-radius:10px;margin-bottom:8px;display:flex;align-items:center;border:1px solid var(--border);}
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="logo-text" style="font-size:28px;text-align:center;margin-bottom:20px;">FF TOURNAMENT</div>
        <input type="password" id="admin-pass" placeholder="PASSWORD ADMIN" class="input-dark" style="text-align:center;letter-spacing:4px;">
        <button onclick="doAdminLogin()" style="width:100%;padding:14px;background:var(--orange);color:white;border:none;border-radius:8px;font-weight:700;font-size:15px;font-family:'Rajdhani';cursor:pointer;margin-bottom:10px;">LOGIN ADMIN</button>
        <button onclick="doGuestLogin()" style="width:100%;padding:12px;background:transparent;color:white;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:'Barlow';">MODE TAMU</button>
    </div>
</div>

<header>
    <div class="logo-text">FF TOURNAMENT</div>
    <div id="sync-status" style="font-size:10px;color:var(--green);">● SYSTEM READY</div>
</header>

<div class="tabs-main">
    <button class="tab-m active" id="tab-input"  onclick="switchPage('input')">INPUT</button>
    <button class="tab-m"        id="tab-board"  onclick="switchPage('board')">LEADERBOARD</button>
    <button class="tab-m"        id="tab-config" onclick="switchPage('config')">PENGATURAN</button>
</div>

<div class="pot-selector" id="pot-nav"></div>

<div id="page-input"  class="scroll-area"><div id="input-list"></div></div>
<div id="page-board"  class="scroll-area" style="display:none;"><div id="board-list"></div></div>
<div id="page-config" class="scroll-area" style="display:none;">
    <div style="background:var(--surface);padding:15px;border-radius:12px;border:1px solid var(--border);margin-bottom:20px;">
        <h4 style="color:var(--orange);margin-bottom:10px;font-family:'Rajdhani';">TAMBAH TIM (POT AKTIF)</h4>
        <textarea id="raw-teams" class="input-dark" style="height:100px;resize:none;" placeholder="Nama tim per baris..."></textarea>
        <button onclick="saveBulk()" style="width:100%;padding:12px;background:var(--orange);border:none;border-radius:8px;color:white;font-weight:700;cursor:pointer;font-family:'Rajdhani';">SIMPAN NAMA TIM</button>
    </div>
    <button onclick="hardReset()" style="width:100%;padding:14px;background:rgba(255,68,68,0.1);border:1px solid var(--red);border-radius:8px;color:var(--red);font-weight:700;cursor:pointer;font-family:'Rajdhani';">KOSONGKAN POT INI</button>
</div>

<script>
const SB_URL = 'https://yhzqlxsmhtwvzorwetsr.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloenFseHNtaHR3dnpvcndldHNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTY2ODcsImV4cCI6MjA5MzU3MjY4N30.TLFhCNKjkxu67OMwLYdjkSJykkVJUZUWlOs6aNvdD58';
const db = supabase.createClient(SB_URL, SB_KEY);

const PTS = [0,12,9,8,7,6,5,4,3,2,1,0,0];
let teams   = [];
let pot     = 1;
let openIdx = null;
let isAdmin = false;

function doAdminLogin() {
    if (document.getElementById('admin-pass').value === 'oslojaya') {
        isAdmin = true;
        document.getElementById('login-screen').style.display = 'none';
        loadData();
    } else { alert('Password Salah!'); }
}
function doGuestLogin() {
    isAdmin = false;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('tab-input').style.display  = 'none';
    document.getElementById('tab-config').style.display = 'none';
    switchPage('board');
    loadData();
}

function switchPage(p) {
    ['input','board','config'].forEach(id => {
        document.getElementById('page-'+id).style.display = (id===p?'block':'none');
        document.getElementById('tab-'+id).classList.toggle('active', id===p);
    });
    document.getElementById('pot-nav').style.display = (p==='config'?'none':'flex');
    if (p==='board') renderBoard();
}

const potNav = document.getElementById('pot-nav');
for (let i=1; i<=12; i++) {
    const b = document.createElement('button');
    b.id = 'pt'+i;
    b.className = 'btn-pot-tab'+(i===1?' active':'');
    b.innerText = 'POT '+i;
    b.setAttribute('data-pot', i);
    potNav.appendChild(b);
}
potNav.addEventListener('click', e => {
    const b = e.target.closest('[data-pot]');
    if (!b) return;
    pot = +b.dataset.pot;
    openIdx = null;
    document.querySelectorAll('.btn-pot-tab').forEach(x => x.classList.toggle('active', x===b));
    renderInput();
    renderBoard();
});

async function loadData() {
    const {data, error} = await db.from('tournament_data').select('*').order('team_index',{ascending:true});
    if (error) { console.error(error); return; }
    teams = data || [];
    renderInput();
    renderBoard();
}

function renderInput() {
    if (!isAdmin) return;
    const filtered = teams.filter(t => t.pot === pot);
    const taken    = filtered.filter(t => t.placement > 0 && t.team_index !== openIdx).map(t => t.placement);

    let html = '';
    filtered.forEach((t, idx) => {
        const isOpen = (openIdx === t.team_index);
        const total  = (PTS[t.placement]||0) + t.kills;
        const tid    = t.team_index;

        html += `<div class="team-item" data-tid="${tid}">
            <div class="team-trigger" data-action="toggle" data-tid="${tid}">
                <div style="font-weight:600">
                    <span style="color:var(--muted);margin-right:10px;">${idx+1}</span>${esc(t.team_name)}
                </div>
                <div style="color:var(--orange);font-weight:700;font-family:'Rajdhani';">${total} PT</div>
            </div>`;

        if (isOpen) {
            let placeHTML = '';
            for (let p=1; p<=12; p++) {
                const sel  = t.placement===p ? ' sel'  : '';
                const used = taken.includes(p) ? ' used' : '';
                placeHTML += `<button class="btn-place${sel}${used}" data-action="place" data-tid="${tid}" data-val="${p}">#${p}</button>`;
            }
            const kadd = [1,5,10,20].map(v =>
                `<button class="btn-kadd" data-action="kadd" data-tid="${tid}" data-val="${v}">+${v}</button>`
            ).join('');

            html += `<div class="panel-content">
                <div class="sect-label">PLACEMENT</div>
                <div class="grid-place">${placeHTML}</div>
                <div class="sect-label">QUICK ADD KILLS</div>
                <div class="kill-grid">
                    ${kadd}
                    <button class="btn-kreset" data-action="kreset" data-tid="${tid}">RESET</button>
                </div>
                <div class="kill-ctrl">
                    <button class="btn-km" data-action="km" data-tid="${tid}">−</button>
                    <div class="kill-num">${t.kills} KILLS</div>
                    <button class="btn-kp" data-action="kp" data-tid="${tid}">+</button>
                </div>
                <button class="btn-save" data-action="close" data-tid="${tid}">SIMPAN &amp; TUTUP</button>
                <button class="btn-del"  data-action="del"   data-tid="${tid}">HAPUS TIM PERMANEN</button>
            </div>`;
        }
        html += '</div>';
    });

    document.getElementById('input-list').innerHTML = html;
}

document.getElementById('input-list').addEventListener('click', async e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;
    const tid    = el.dataset.tid !== undefined ? +el.dataset.tid : null;
    const val    = el.dataset.val !== undefined ? +el.dataset.val : 0;

    if (action === 'toggle') { openIdx = (openIdx===tid)?null:tid; renderInput(); return; }
    if (action === 'close')  { openIdx = null; renderInput(); return; }
    if (action === 'del') {
        if (!confirm('Hapus tim ini?')) return;
        openIdx = null;
        await db.from('tournament_data').delete().eq('team_index', tid);
        await loadData(); return;
    }

    const t = teams.find(x => x.team_index === tid);
    if (!t) return;
    if (action === 'place')  t.placement = (t.placement===val)?0:val;
    else if (action === 'kadd')   t.kills = Math.max(0, t.kills + val);
    else if (action === 'kreset') t.kills = 0;
    else if (action === 'km')     t.kills = Math.max(0, t.kills - 1);
    else if (action === 'kp')     t.kills = t.kills + 1;

    renderInput();
    renderBoard();
    await db.from('tournament_data').update({placement:t.placement, kills:t.kills}).eq('team_index', tid);
});

function renderBoard() {
    const sorted = teams
        .filter(t => t.pot === pot)
        .map(t => ({...t, total:(PTS[t.placement]||0)+t.kills}))
        .sort((a,b) => b.total-a.total || b.kills-a.kills);

    document.getElementById('board-list').innerHTML = sorted.map((t,i) => `
        <div class="board-item">
            <div style="width:30px;font-weight:700;font-family:'Rajdhani';color:${i<3?'var(--orange)':'white'}">${i+1}</div>
            <div style="flex:1;font-weight:600;">${esc(t.team_name)}</div>
            <div style="text-align:right;">
                <div style="color:var(--orange);font-weight:700;font-family:'Rajdhani';">${t.total} PT</div>
                <div style="font-size:10px;color:var(--muted);">${t.kills} Kills · #${t.placement||'-'}</div>
            </div>
        </div>`).join('');
}

async function saveBulk() {
    const names = document.getElementById('raw-teams').value
        .split('\n').map(n=>n.trim()).filter(Boolean);
    if (!names.length) return;
    await db.from('tournament_data').insert(names.map(n=>({pot, team_name:n, placement:0, kills:0})));
    document.getElementById('raw-teams').value = '';
    loadData();
}
async function hardReset() {
    if (!confirm('Hapus semua tim di POT ini?')) return;
    await db.from('tournament_data').delete().eq('pot', pot);
    loadData();
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
